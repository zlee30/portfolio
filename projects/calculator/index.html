<!DOCTYPE html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">
    <div class="display-area">
      <div id="history">&nbsp;</div>
      <div id="display">0</div>
    </div>

    <div class="buttons">
      <button class="action" onclick="clearAll()">C</button>
      <button class="action" onclick="appendBracket()">( )</button>
      <button class="action" onclick="backspace()">←</button>
      <button class="operator" onclick="appendOp('/')">÷</button>

      <button onclick="appendNum('7')">7</button>
      <button onclick="appendNum('8')">8</button>
      <button onclick="appendNum('9')">9</button>
      <button class="operator" onclick="appendOp('*')">×</button>

      <button onclick="appendNum('4')">4</button>
      <button onclick="appendNum('5')">5</button>
      <button onclick="appendNum('6')">6</button>
      <button class="operator" onclick="appendOp('-')">−</button>

      <button onclick="appendNum('1')">1</button>
      <button onclick="appendNum('2')">2</button>
      <button onclick="appendNum('3')">3</button>
      <button class="operator" onclick="appendOp('+')">+</button>

      <button class="action" onclick="percent()">%</button>
      <button onclick="appendNum('0')">0</button>
      <button onclick="appendNum('.')">.</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>

  <div class="signature">Zach Lee</div>

  <script src="script.js"></script>
</body>
</html>
